services:
  mysql:
    image: mysql:8.0
    container_name: im-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: im_server
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: im-app
    ports:
      - "8080:8080"
    environment:
      - IM_DB_DSN=root:password@tcp(mysql:3306)/im_server?charset=utf8mb4&parseTime=True&loc=Local
      - IM_JWT_SECRET=your-jwt-secret-change-in-production
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  mysql-data:
  uploads:
